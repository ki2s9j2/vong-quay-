<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay 8/3 Lớp Mình</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Paytone+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1 { font-family: 'Paytone One', sans-serif; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        #wheel { transition: transform 7s cubic-bezier(0.25, 0.1, 0.25, 1); filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.15)); width: 100%; height: auto; max-width: 384px; }
        .slide-toggle.hidden, #resultModal.hidden { opacity: 0; pointer-events: none; }
        #resultModal { transition: opacity 0.3s ease; }
        #resultModal .modal-content { transition: transform 0.3s ease-out; }
        .winner-glow { text-shadow: 0 0 10px rgba(225,29,72,0.8), 0 0 20px rgba(225,29,72,0.5); }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-pink-200 min-h-screen text-gray-800 flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-lg mx-auto bg-white rounded-3xl shadow-2xl p-6 md:p-8 relative">
        <h1 class="text-4xl md:text-5xl font-bold text-center mb-2 text-rose-500">Vòng Quay 8/3</h1>
        
        <div id="prizeStatusBox" class="bg-rose-100 rounded-lg p-3 mb-8 text-center shadow-inner border border-rose-200">
            <span class="text-rose-600 font-bold text-lg" id="prizeStatus">Đang quay: GIẢI BA</span>
        </div>
        
        <div class="relative w-full max-w-sm mx-auto mb-20 flex items-center justify-center">
            <!-- Mũi tên chỉ vòng quay -->
            <div class="absolute -top-2 left-1/2 -translate-x-1/2 z-10" style="filter: drop-shadow(0 4px 5px rgba(0,0,0,0.4));">
                 <svg width="45" height="60" viewBox="0 0 40 55">
                    <path d="M20 0 L40 25 L20 55 L0 25 Z" fill="#facc15"></path>
                    <path d="M20 5 L35 25 L20 45 L5 25 Z" fill="#f59e0b"></path>
                    <circle cx="20" cy="25" r="7" fill="white"></circle>
                    <circle cx="20" cy="25" r="4" fill="#f59e0b"></circle>
                </svg>
            </div>

            <!-- Canvas vòng quay -->
            <canvas id="wheel" class="rounded-full border-8 border-rose-100 shadow-xl"></canvas>

            <!-- Chân đế vòng quay -->
            <div class="absolute -bottom-14 left-1/2 -translate-x-1/2">
                <div class="w-24 h-16 bg-rose-600 rounded-t-lg" style="clip-path: polygon(15% 0, 85% 0, 100% 100%, 0% 100%)"></div>
                <div class="w-32 h-5 bg-rose-800 rounded-b-lg -mt-1 shadow-inner"></div>
            </div>
        </div>

        <div class="w-full px-4 text-center mt-6">
            <button id="spinBtn" class="w-full bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white font-bold py-4 px-6 rounded-2xl text-2xl shadow-[0_8px_20px_rgba(225,29,72,0.4)] transform hover:-translate-y-1 transition-all duration-300 focus:outline-none ring-4 ring-pink-100">
                QUAY GIẢI
            </button>
            <div id="result" class="text-xl font-bold text-rose-500 h-8 mt-4 animate-pulse"></div>
        </div>
    </div>

    <!-- Modal Kết Quả -->
    <div id="resultModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300 opacity-0 pointer-events-none">
        <div id="modalContent" class="modal-content bg-white rounded-[2rem] shadow-2xl p-8 md:p-12 text-center transform scale-90 border-4 border-rose-100 max-w-md w-full relative overflow-hidden">
            <!-- Decorative Elements -->
            <div class="absolute -top-10 -left-10 text-6xl opacity-20">🌸</div>
            <div class="absolute -bottom-10 -right-10 text-6xl opacity-20">💖</div>
            
            <div id="modalPrize" class="text-2xl font-black text-rose-500 mb-2 uppercase tracking-wider">GIẢI BA</div>
            <h2 class="text-3xl font-bold mb-6 text-gray-700">Xin Chúc Mừng!</h2>
            
            <div class="py-4 border-y-2 border-rose-50 my-6">
                <p id="modalResultText" class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-rose-500 to-red-500 winner-glow leading-tight pb-2"></p>
            </div>
            
            <button id="closeModalBtn" class="mt-4 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-10 rounded-xl text-xl shadow-lg transform hover:scale-105 transition-transform duration-200">
                Tuyệt Vời
            </button>
        </div>
    </div>

    <script>
        // 25 Tên chính xác theo yêu cầu
        const namesList = [
            "Nguyễn Anh Thư", "Trương Thị Minh Ánh", "Hà Thị Hải Yến", "Trần Thu Hằng",
            "Triệu Yến Vy", "Nguyễn Nguyệt Ánh", "Đào Thị Hải Yến", "Trương Thị Minh Anh",
            "Vi Vũ Ngọc Bích", "Đặng Hồng Ngọc", "Nguyễn Thùy Dương", "Ma Phạm Uyên Nhi",
            "Nguyễn Phương Vy", "Trương Mai Anh", "Nguyễn Thùy Giang", "Nguyễn Huyền Phương Mai",
            "Nhâm Ngọc Linh", "Đỗ Thanh Mai", "Phạm Khánh Huyền", "Nguyễn Phương Thảo",
            "Mai Khánh Huyền", "Cao Thị Thu Hương", "Nguyễn Bích Nghi", "Lê Vũ Phương Mai",
            "Nguyễn Thu Trang"
        ];
        
        // Khởi tạo options
        let options = namesList.map((name) => ({ text: name }));
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const prizeStatus = document.getElementById('prizeStatus');
        
        const resultModal = document.getElementById('resultModal');
        const modalContent = document.getElementById('modalContent');
        const modalPrize = document.getElementById('modalPrize');
        const modalResultText = document.getElementById('modalResultText');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        // Bảng màu hồng/đỏ nhẹ nhàng 8/3
        const colors = [
            "#fecdd3", "#fda4af", "#fb7185", "#f43f5e", "#e11d48",
            "#fbcfe8", "#f472b6", "#ec4899", "#db2777"
        ];
        const dimmedColor = '#cbd5e1'; // Màu xám cho những người đã trúng giải
        
        let currentRotationDegrees = 0;
        let currentPrizeRank = 3; // 3 -> Giải Ba, 2 -> Giải Nhì, 1 -> Giải Nhất
        const prizeTitles = { 3: "GIẢI BA", 2: "GIẢI NHÌ", 1: "GIẢI NHẤT" };
        
        // --- ÂM THANH ---
        let audioContext;
        let tickTimeoutId;
        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playTick() {
            if (!audioContext) return;
            const o = audioContext.createOscillator();
            const g = audioContext.createGain();
            o.connect(g); g.connect(audioContext.destination);
            o.type = 'triangle'; o.frequency.setValueAtTime(800, audioContext.currentTime);
            g.gain.setValueAtTime(0.2, audioContext.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
            o.start(audioContext.currentTime); o.stop(audioContext.currentTime + 0.05);
        }
        
        function playWinSound() {
            if (!audioContext) return;
            const notes = [329.63, 392.00, 523.25, 659.25]; // Âm tươi sáng
            notes.forEach((note, i) => {
                const o = audioContext.createOscillator();
                const g = audioContext.createGain();
                o.connect(g); g.connect(audioContext.destination);
                o.type = 'sine'; o.frequency.setValueAtTime(note, audioContext.currentTime + i * 0.15);
                g.gain.setValueAtTime(0.4, audioContext.currentTime + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.4);
                o.start(audioContext.currentTime + i * 0.15); o.stop(audioContext.currentTime + i * 0.15 + 0.4);
            });
        }
        
        // --- VẼ VÒNG QUAY ---
        function getShortName(fullName) {
            const parts = fullName.split(' ');
            if(parts.length <= 1) return fullName;
            const lastName = parts[parts.length - 1];
            const middleInitial = parts[parts.length - 2][0];
            return middleInitial + ". " + lastName;
        }

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = 2 * Math.PI / numOptions;
            const radius = canvas.width / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(radius, radius);
            
            for (let i = 0; i < numOptions; i++) {
                const opt = options[i];
                const angle = i * arcSize;
                
                // Vẽ Cánh Quạt
                ctx.beginPath();
                ctx.arc(0, 0, radius - 5, angle, angle + arcSize, false);
                ctx.lineTo(0, 0);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Trực qua văn bản
                ctx.save();
                ctx.fillStyle = '#881337'; // Màu chữ
                ctx.font = "bold 12px 'Be Vietnam Pro', sans-serif";
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                
                // Xoay tới tâm của cánh
                ctx.rotate(angle + arcSize / 2);
                
                // Vẽ văn bản
                ctx.fillText(getShortName(opt.text), radius * 0.85, 0);
                ctx.restore();
            }
            
            // Vẽ tâm
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#f43f5e';
            ctx.fill();
            
            ctx.restore();
        }

        function resizeCanvas() {
            const size = canvas.clientWidth || 350;
            if (canvas.width !== size) {
                canvas.width = size;
                canvas.height = size;
                drawWheel();
            }
        }
        
        // --- HIỆU ỨNG VÀ QUAY ---
        function triggerConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;
            const interval = setInterval(() => {
                if (Date.now() > end) return clearInterval(interval);
                confetti({
                    particleCount: 20, startVelocity: 30, spread: 360, zIndex: 100, origin: { x: Math.random(), y: Math.random() - 0.2 },
                    colors: ['#ffb3c6', '#ff8fac', '#fb7185', '#f43f5e']
                });
            }, 200);
        }

        function showWinner(winnerObj) {
            playWinSound();
            modalPrize.textContent = prizeTitles[currentPrizeRank];
            modalResultText.textContent = winnerObj.text;
            
            resultModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
            
            triggerConfetti();
        }

        function spin() {
            if (currentPrizeRank < 1) {
                resultDiv.textContent = "Đã trao xong 3 giải!";
                return;
            }
            
            initAudio();
            spinBtn.disabled = true;
            resultDiv.textContent = "Đang quay " + prizeTitles[currentPrizeRank] + "...";
            
            // Chọn ngẫu nhiên 1 người chiến thắng (Loại trừ 3 tên không được trúng)
            const bannedNames = ["Ma Phạm Uyên Nhi", "Lê Vũ Phương Mai", "Nguyễn Phương Vy"];
            
            // Lọc ra danh sách những người hợp lệ để trúng giải
            const eligibleOptions = options.map((opt, idx) => ({ ...opt, index: idx })).filter(opt => !bannedNames.includes(opt.text));
            
            if (eligibleOptions.length === 0) {
                resultDiv.textContent = "Không còn người hợp lệ để quay!";
                spinBtn.disabled = false;
                return;
            }
            
            // Xoay ngẫu nhiên từ danh sách hợp lệ
            const randomEligible = eligibleOptions[Math.floor(Math.random() * eligibleOptions.length)];
            const winningIndex = randomEligible.index;
            const winnerObj = options[winningIndex];
            
            const spinDuration = 6000; // 6 seconds
            const startTime = Date.now();
            
            // Hiệu ứng "Tích Tích"
            function scheduleTick() {
                const elapsed = Date.now() - startTime;
                if (elapsed >= spinDuration - 250) return;
                playTick();
                tickTimeoutId = setTimeout(scheduleTick, 50 + 600 * Math.pow(elapsed / spinDuration, 2));
            }
            scheduleTick();
            
            // Tính toán góc Dừng Tương Đối Cho Người Chiến Thắng
            const numOptions = options.length;
            const arcSizeDegrees = 360 / numOptions;
            const segmentCenterDegrees = (winningIndex * arcSizeDegrees) + (arcSizeDegrees / 2);
            // 270 độ là vị trí mũi tên hướng thẳng xuống vòng quay (hướng chỉ ở trên cùng là 90 độ tính từ phải qua)
            const desiredStopAngle = 270 - segmentCenterDegrees;
            
            // Quay ít nhất 7-10 vòng mới dừng
            const randomExtraRotations = (Math.floor(Math.random() * 4) + 7) * 360;
            currentRotationDegrees = Math.ceil(currentRotationDegrees / 360) * 360 + randomExtraRotations + desiredStopAngle;
            
            canvas.style.transform = `rotate(${currentRotationDegrees}deg)`;
            
            // Khi dừng quay
            setTimeout(() => {
                clearTimeout(tickTimeoutId);
                
                // Xóa hẳn người thắng khỏi mảng để vòng xoay co lại
                options.splice(winningIndex, 1);
                
                resultDiv.textContent = '';
                showWinner(winnerObj);
                drawWheel(); // Vẽ lại với số lượng người ít hơn
                
            }, spinDuration);
        }

        // --- ĐÓNG MODAL & TIẾP TỤC QUAY ---
        closeModalBtn.addEventListener('click', () => {
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            
            setTimeout(() => {
                resultModal.classList.add('opacity-0', 'pointer-events-none');
                
                // Hạ rank giải xuống (Ba -> Nhì -> Nhất)
                currentPrizeRank--;
                
                if (currentPrizeRank >= 1) {
                    prizeStatus.textContent = "Đang quay: " + prizeTitles[currentPrizeRank];
                    spinBtn.disabled = false;
                } else {
                    prizeStatus.textContent = "HOÀN THÀNH QUAY THƯỞNG 8/3 🎉";
                    prizeStatus.parentElement.classList.replace('bg-rose-100', 'bg-green-100');
                    prizeStatus.classList.replace('text-rose-600', 'text-green-600');
                    spinBtn.textContent = "KẾT THÚC";
                    spinBtn.disabled = true;
                    // Bắn pháo hoa ăn mừng tổng quát
                    triggerConfetti();
                }
            }, 300);
        });

        // Khởi tạo
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', () => {
            setTimeout(resizeCanvas, 100);
        });
        spinBtn.addEventListener('click', spin);

    </script>
</body>
</html>
